name: Refresh stock signals (yfinance)

on:
  schedule:
    - cron: '5 23 * * *'     # 매일 08:05 KST (23:05 UTC 전일) — 미국장 마감 후·정시 부하 회피
    - cron: '40 23 * * *'    # 08:40 KST 백업 (첫 슬롯 드롭 대비, 변경 없으면 스킵)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-stocks
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install --quiet pandas numpy yfinance
      - name: Compute technical signals
        run: python build/refresh_stocks.py
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # ⚠ 생성기 산출물 전부 커밋: stocks.json(슬림)·home_reco.json·data/sd/(종목별 상세, 삭제 포함)
          #   + target_history.json(목표주가 이력 누적 — 커밋 안 하면 매 실행 fresh checkout이라 영구 유실)
          #   하나라도 빠지면 해당 화면이 낡은 채 고착된다(home_reco 누락 사고의 교훈)
          if [ -n "$(git status --porcelain data/stocks.json data/home_reco.json data/sd data/target_history.json)" ]; then
            git add data/stocks.json data/home_reco.json data/sd data/target_history.json
            git commit -m "chore(data): 종목 테크니컬 시그널 자동 갱신"
            # regime 워크플로와 같은 main에 push → 경합 시 리베이스 후 1회 재시도(강제 push 금지)
            git push || (git pull --rebase origin main && git push)
            echo "갱신·푸시 완료 → GitHub Pages(branch source) 자동 재빌드"
          else
            echo "변경 없음 — 스킵"
          fi
