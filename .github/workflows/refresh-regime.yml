name: Refresh market regime (FRED)

on:
  schedule:
    - cron: '0 23 * * 1-5'   # 평일 23:00 UTC (KST 익일 08:00)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-regime
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install --quiet pandas numpy yfinance fredapi
      - name: Compute market regime
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python build/refresh_regime.py
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/regime.json)" ]; then
            git add data/regime.json
            git commit -m "chore(data): 시장 국면(레짐) 자동 갱신"
            git push
            echo "갱신·푸시 완료 → GitHub Pages 자동 재빌드"
          else
            echo "변경 없음 — 스킵"
          fi
