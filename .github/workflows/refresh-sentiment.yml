name: Refresh market sentiment (VIX/FRED)

on:
  schedule:
    - cron: '0 0 * * *'     # 매일 09:00 KST (00:00 UTC 당일) — stocks(:35/:10)·regime(:45/:20)·holdings(:55)와 분(minute) 모두 어긋나게
    - cron: '35 0 * * *'    # 09:35 KST 백업 (변경 없으면 스킵)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: refresh-sentiment
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install --quiet pandas numpy yfinance fredapi
      - name: Compute market sentiment index
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: python build/refresh_sentiment.py
      - name: Commit if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/sentiment.json)" ]; then
            git add data/sentiment.json
            git commit -m "chore(data): 시장 심리 지수 자동 갱신"
            # stocks/regime 워크플로와 같은 main에 push → 경합 시 리베이스 후 1회 재시도
            git push || (git pull --rebase origin main && git push)
            echo "갱신·푸시 완료 → GitHub Pages 자동 재빌드"
          else
            echo "변경 없음 — 스킵"
          fi
      # '돌았는데 낡은 데이터'면 잡 실패 → GitHub 기본 실패 알림 메일. '안 뜬' 케이스는 sources.html 배지가 드러낸다.
      - name: Verify freshness
        run: python build/check_freshness.py data/sentiment.json "시장 심리" 2
